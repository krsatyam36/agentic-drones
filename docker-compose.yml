services:
  agentic-drones:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: agentic-drones:latest
    container_name: agentic_drones
    network_mode: host
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY:-}
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-}
      - OLLAMA_HOST=127.0.0.1
      - PX4_SIM_HOST_ADDR=127.0.0.1
    volumes:
      - ./:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    ipc: host
    stdin_open: true
    tty: true
    working_dir: /workspace
    command: /bin/bash
